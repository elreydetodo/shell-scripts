[fill]
symbol = ' '

[character]
format = "$symbol "
success_symbol = "[‚ĚĮ](bold bright-green)"
error_symbol = "[‚ĚĮ](bold bright-red)"
vimcmd_symbol = "[‚Ė†](bold dimmed bright green)"
# not supported in zsh
vimcmd_replace_one_symbol = "‚óĆ"
vimcmd_replace_symbol = "‚Ė°"
vimcmd_visual_symbol = "‚Ėľ"

[env_var.VIMSHELL]
format = "[$env_value]($style)"
style = 'green italic'

[sudo]
format = "[$symbol]($style)"
style = "bold italic bright-purple"
symbol = "‚čą‚Ēą"
disabled = false

[username]
style_user = "bright-yellow bold italic"
style_root = "purple bold italic"
format = "[‚≠ė $user]($style) "
disabled = false
show_always = false

[directory]
home_symbol = "‚Ćā"
truncation_length = 2
truncation_symbol = "‚Ė° "
read_only = " ‚óą"
use_os_path_sep = true
style = "italic blue"
format = '[$path]($style)[$read_only]($read_only_style)'
repo_root_style = 'bold blue'
repo_root_format = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) [‚Ė≥](bold bright-blue)'

[cmd_duration]
format = "[‚óĄ $duration ](italic white)"

[jobs]
format = "[$symbol$number]($style) "
style = "white"
symbol = "[‚Ė∂](blue italic)"

[localip]
ssh_only = true
format = " ‚óĮ[$localipv4](bold magenta)"
disabled = false

[time]
disabled = false
format = "[ $time]($style)"
#time_format = "%R"
utc_time_offset = "local"
style = "italic dimmed white"

[battery]
format = "[ $percentage $symbol]($style)"
full_symbol = "‚Ėą"
charging_symbol = "[‚ÜĎ](italic bold green)"
discharging_symbol = "‚Üď"
unknown_symbol = "‚ĖĎ"
empty_symbol = "‚ĖÉ"

[[battery.display]]
threshold = 20
style = "italic bold red"

[[battery.display]]
threshold = 60
style = "italic dimmed bright-purple"

[[battery.display]]
threshold = 70
style = "italic dimmed yellow"

[git_branch]
format = " [$branch(:$remote_branch)]($style)"
symbol = "[‚Ė≥](bold italic bright-blue)"
style = "italic bright-blue"
truncation_symbol = "‚čĮ"
truncation_length = 11
ignore_branches = ["main", "master"]
only_attached = true

[git_metrics]
format = '([‚Ėī$added]($added_style))([‚ĖŅ$deleted]($deleted_style))'
added_style = 'italic dimmed green'
deleted_style = 'italic dimmed red'
ignore_submodules = true
disabled = false

[git_status]
style = "bold italic bright-blue"
format = "([‚é™$ahead_behind$staged$modified$untracked$renamed$deleted$conflicted$stashed‚é•]($style))"
conflicted = "[‚ó™‚ó¶](italic bright-magenta)"
ahead = "[‚Ėī‚Ēā[${count}](bold white)‚Ēā](italic green)"
behind = "[‚ĖŅ‚Ēā[${count}](bold white)‚Ēā](italic red)"
diverged = "[‚óá ‚Ėī‚Ē§[${ahead_count}](regular white)‚Ēā‚ĖŅ‚Ē§[${behind_count}](regular white)‚Ēā](italic bright-magenta)"
untracked = "[‚óĆ‚ó¶](italic bright-yellow)"
stashed = "[‚óÉ‚óą](italic white)"
modified = "[‚óŹ‚ó¶](italic yellow)"
staged = "[‚Ė™‚Ē§[$count](bold white)‚Ēā](italic bright-cyan)"
renamed = "[‚óé‚ó¶](italic bright-blue)"
deleted = "[‚úē](italic red)"

[deno]
format = " [deno](italic) [‚ąę $version](green bold)"
version_format = "${raw}"

[lua]
format = " [lua](italic) [${symbol}${version}]($style)"
version_format = "${raw}"
symbol = "‚®Ä "
style = "bold bright-yellow"

[nodejs]
format = " [node](italic) [‚óę ($version)](bold bright-green)"
version_format = "${raw}"
detect_files = ["package-lock.json", "yarn.lock"]
detect_folders = ["node_modules"]
detect_extensions = []

[python]
format = " [py](italic) [${symbol}${version}]($style)"
symbol = "[‚ĆČ](bold bright-blue)‚Ćä "
version_format = "${raw}"
style = "bold bright-yellow"

[ruby]
format = " [rb](italic) [${symbol}${version}]($style)"
symbol = "‚óÜ "
version_format = "${raw}"
style = "bold red"

[rust]
format = " [rs](italic) [$symbol$version]($style)"
symbol = "‚äÉ "
version_format = "${raw}"
style = "bold red"

[package]
format = " [pkg](italic dimmed) [$symbol$version]($style)"
version_format = "${raw}"
symbol = "‚ó® "
style = "dimmed yellow italic bold"

[swift]
format = " [sw](italic) [${symbol}${version}]($style)"
symbol = "‚óĀ "
style = "bold bright-red"
version_format = "${raw}"

[aws]
disabled = true
format = " [aws](italic) [$symbol $profile $region]($style)"
style = "bold blue"
symbol = "‚Ė≤ "

[buf]
symbol = "‚Ė† "
format = " [buf](italic) [$symbol $version $buf_version]($style)"

[c]
symbol = "‚Ąā "
format = " [$symbol($version(-$name))]($style)"

[cpp]
symbol = "‚Ąā "
format = " [$symbol($version(-$name))]($style)"

[conda]
symbol = "‚óĮ "
format = " conda [$symbol$environment]($style)"

[pixi]
symbol = "‚Ė† "
format = " pixi [$symbol$version ($environment )]($style)"

[dart]
symbol = "‚óĀ‚óÖ "
format = " dart [$symbol($version )]($style)"

[docker_context]
symbol = "‚óß "
format = " docker [$symbol$context]($style)"

[elixir]
symbol = "‚Ė≥ "
format = " exs [$symbol $version OTP $otp_version ]($style)"

[elm]
symbol = "‚ó© "
format = " elm [$symbol($version )]($style)"

[golang]
symbol = "‚ą© "
format = " go [$symbol($version )]($style)"

[haskell]
symbol = "‚ĚĮőĽ "
format = " hs [$symbol($version )]($style)"

[java]
symbol = "‚ą™ "
format = " java [${symbol}(${version} )]($style)"

[julia]
symbol = "‚óé "
format = " jl [$symbol($version )]($style)"

[memory_usage]
symbol = "‚Ė™‚Ėę‚Ė™ "
format = " mem [${ram}( ${swap})]($style)"

[nim]
symbol = "‚Ėī‚Ė≤‚Ėī "
format = " nim [$symbol($version )]($style)"

[nix_shell]
style = 'bold italic dimmed blue'
symbol = '‚ú∂'
format = '[$symbol nix‚é™$state‚é™]($style) [$name](italic dimmed white)'
impure_msg = '[‚ĆĹ](bold dimmed red)'
pure_msg = '[‚Ćĺ](bold dimmed green)'
unknown_msg = '[‚óĆ](bold dimmed yellow)'

[spack]
symbol = "‚óá "
format = " spack [$symbol$environment]($style)"
