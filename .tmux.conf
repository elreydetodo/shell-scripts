# --- PREFIX SETTINGS ---
# Use both C-a and C-b as prefixes during the transition
set -g prefix C-a
set -g prefix2 C-b
bind C-a send-prefix
bind C-b send-prefix

# --- GENERAL SETTINGS ---
set -g history-limit 19000
set -g mouse on
set -s escape-time 0      # Fixes Vim Esc delay
set -g base-index 1       # Start windows at 1
setw -g pane-base-index 1 # Start panes at 1
set -g renumber-windows on
set -g default-terminal "tmux-256color"

# Mouse handling - Disable tmux's drag-to-select so the terminal can do it
# This allows native Cmd+C to work. You can still scroll with the wheel.
unbind -n MouseDrag1Pane
unbind -T copy-mode-vi MouseDrag1Pane

# --- VI MODE & CLIPBOARD ---
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Cross-platform clipboard (macOS / Linux)
if-shell "uname | grep -q Darwin" \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -sel clip -i"'

# --- NAVIGATION ---
# Open new panes/windows in the same directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Easy config reload (Now uses your Prefix + r)
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"