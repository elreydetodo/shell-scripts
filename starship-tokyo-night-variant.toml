"$schema" = 'https://starship.rs/config-schema.json'

format = """
[░▒▓](#a3aed2)\
[  ](bg:#a3aed2 fg:#090c0c)\
$status\
$cmd_duration\
[ ](bg:#769ff0 fg:#a3aed2)\
$directory\
[ ](bg:#394260 fg:#769ff0)\
(\
$git_branch\
$git_status\
$git_state\
[ ](bg:#212736 fg:#394260)\
)\
(\
$c\
$cpp\
$java\
$nodejs\
$python\
[ ](bg:#1d1d1d fg:#212736)\
)\
$time\
[ ](fg:#1d1d1d)\
\n\
[░▒▓](#a3aed2)\
$character"""

[c]
format = '[$symbol($version(-$name) )]($style)'
style = 'bg:#212736 fg:#769ff0'

[cmd_duration]
format = '[took $duration]($style)'
min_time = 1
show_milliseconds = true
style = 'bg:#a3aed2 fg:#090c0c'

[cpp]
format = '[$symbol($version(-$name) )]($style)'
style = 'bg:#212736 fg:#769ff0'

[directory]
format = '[ $path ]($style)'
style = 'bg:#769ff0 fg:#e3e5e5'
truncation_length = 3
truncation_symbol = '…/'

[directory.substitutions]
'Documents' = '󰈙 '
'Downloads' = ' '
'Music' = ' '
'Pictures' = ' '

[git_branch]
format = '[$symbol $branch(:$remote_branch) ]($style)'
style = 'bg:#394260 fg:#769ff0'

[git_status]
format = '[($all_status $ahead_behind) ]($style)'
style = 'bg:#394260 fg:#769ff0'

[java]
format = '[${symbol}${version} ]($style)'
style = 'bg:#212736 fg:#769ff0'

[nodejs]
format = '[${symbol}(${version}) ]($style)'
style = 'bg:#212736 fg:#769ff0'

[python]
format = '[${symbol}${pyenv_prefix} (${version}) (\($virtualenv\)) ]($style)'
style = 'bg:#212736 fg:#769ff0'

[status]
disabled = false
format = '[⇈ $symbol \($status\) ]($style)'
map_symbol = true
pipestatus = true
style = 'bg:#a3aed2 fg:#090c0c'

[time]
disabled = false
format = '[ $time ]($style)'
style = 'bg:#1d1d1d fg:#a0a9cb'
